name: Test Coverage

on:
  push:
    branches: [main, ui]
  pull_request:
    branches: [main, ui]

jobs:
  backend-tests:
    name: Backend Tests & JaCoCo Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests and generate JaCoCo report
        working-directory: insurance-claim-system
        run: mvn -B clean verify jacoco:report

      - name: Check backend coverage threshold (≥80%)
        working-directory: insurance-claim-system
        run: |
          COVERAGE=$(python3 - <<'EOF'
          import xml.etree.ElementTree as ET, sys
          try:
            tree = ET.parse('target/site/jacoco/jacoco.xml')
            root = tree.getroot()
            for counter in root.findall('counter'):
              if counter.get('type') == 'INSTRUCTION':
                missed = int(counter.get('missed', 0))
                covered = int(counter.get('covered', 0))
                total = missed + covered
                pct = (covered / total * 100) if total > 0 else 0
                print(f'{pct:.1f}')
                sys.exit(0)
            print('0.0')
          except Exception as e:
            print(f'Error: {e}', file=sys.stderr)
            print('0.0')
          EOF
          )
          echo "Backend instruction coverage: ${COVERAGE}%"
          python3 -c "
          cov = float('${COVERAGE}')
          if cov < 80.0:
              print(f'ERROR: Coverage {cov:.1f}% is below the required 80% threshold.')
              exit(1)
          else:
              print(f'OK: Coverage {cov:.1f}% meets the >=80% requirement.')
          "

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: insurance-claim-system/target/site/jacoco/
          retention-days: 14

  frontend-tests:
    name: Frontend Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: insurance-frontend/package-lock.json

      - name: Install dependencies
        working-directory: insurance-frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: insurance-frontend
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: insurance-frontend/coverage/
          retention-days: 14

  coverage-comment:
    name: Post Coverage Summary to PR
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: jacoco-report/

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let backendCoverage = 'N/A';
            let backendStatus = '⚠️';
            try {
              const xml = fs.readFileSync('jacoco-report/jacoco.xml', 'utf8');
              const match = xml.match(/type="INSTRUCTION"\s+missed="(\d+)"\s+covered="(\d+)"/);
              if (match) {
                const missed = parseInt(match[1]);
                const covered = parseInt(match[2]);
                const total = missed + covered;
                if (total > 0) {
                  const pct = (covered / total * 100).toFixed(1);
                  backendCoverage = `${pct}%`;
                  backendStatus = parseFloat(pct) >= 80 ? '✅' : '❌';
                }
              }
            } catch (e) {
              console.log('Could not parse jacoco.xml:', e.message);
            }

            const body = [
              '## 📊 Coverage Report',
              '',
              '| Layer | Coverage | Threshold | Status |',
              '|-------|----------|-----------|--------|',
              `| Backend (JaCoCo) | ${backendCoverage} | ≥80% | ${backendStatus} |`,
              `| Frontend (Vitest) | See artifact | ≥80% | See CI logs |`,
              '',
              '> Generated by GitHub Actions. Download full reports from the workflow artifacts.',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
