version: "3.9"

services:
  app:
    build: .
    container_name: insurance-claim-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_NAME: insurance_claims
      DB_USERNAME: claims_user
      DB_PASSWORD: claims_pass
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: insurance-claim-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: insurance_claims
      POSTGRES_USER: claims_user
      POSTGRES_PASSWORD: claims_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claims_user -d insurance_claims"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
