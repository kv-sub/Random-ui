# ─────────────────────────────────────────────────────────────────────────────
# Insurance Claim System — Docker Compose
#
# Production  (api + db + frontend):
#   docker compose --env-file .env.prod up --build
#   docker compose up --build                       ← same, uses defaults
#
# Test / Dev  (api + db + frontend + synthetic-agent):
#   docker compose --env-file .env.test --profile test up --build
#
# APP_ENV controls the Spring Boot active profile:
#   prod      → SPRING_PROFILES_ACTIVE=prod      (public schema, seed data)    ← prod mode
#   synthetic → SPRING_PROFILES_ACTIVE=synthetic (synthetic schema, agent data) ← test mode
#
# The synthetic-agent service is ONLY added when --profile test is passed.
# The frontend service starts in ALL modes (no profile restriction).
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ──────────────── PostgreSQL ────────────────
  db:
    image: postgres:16-alpine
    container_name: insurance-claim-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-insurance_claims}
      POSTGRES_USER: ${DB_USERNAME:-claims_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-claims_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-claims_user} -d ${DB_NAME:-insurance_claims}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────── Spring Boot API ────────────────
  app:
    build: .
    container_name: insurance-claim-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${APP_ENV:-prod}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-insurance_claims}
      DB_USERNAME: ${DB_USERNAME:-claims_user}
      DB_PASSWORD: ${DB_PASSWORD:-claims_pass}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ──────────────── React Frontend (ALL profiles) ────────────────
  # Vite dev server — http://localhost:5173
  # Proxies /api/v1 → app:8080 inside the Docker network.
  # Starts in BOTH prod and test modes.
  frontend:
    build:
      context: ../insurance-frontend
    container_name: insurance-frontend
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://app:8080
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────── Synthetic Data Agent (TEST profile only) ────────────────
  # Started only when:  docker compose --profile test up
  # Streamlit UI accessible at: http://localhost:8501
  synthetic-agent:
    build:
      context: ..
      dockerfile: synthetic-agent/Dockerfile
    container_name: insurance-synthetic-agent
    ports:
      - "8501:8501"
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_DATABASE: ${DB_NAME:-insurance_claims}
      PG_USER: ${DB_USERNAME:-claims_user}
      PG_PASSWORD: ${DB_PASSWORD:-claims_pass}
      SRC_SCHEMA: ${SRC_SCHEMA:-public}
      TGT_SCHEMA: ${TGT_SCHEMA:-synthetic}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - test

volumes:
  pgdata:

networks:
  default:
    name: insurance-claim-system-network
    driver: bridge
