# ──────────────────────────────────────────────────────────────────
# Spring profile: "synthetic"
# Used by Docker test mode (APP_ENV=synthetic in .env.test).
#
# Points Spring Boot at the `synthetic` schema so the API serves
# data generated by the Synthetic Data Agent instead of the seed
# data in the `public` schema.
#
# ddl-auto: none  → Hibernate does NOT validate or create tables.
# Tables are created/dropped by the synthetic agent itself, so they
# only exist after the agent has run at least once.
# ──────────────────────────────────────────────────────────────────
spring:
  datasource:
    # currentSchema=synthetic sets PostgreSQL search_path at the connection level.
    # Combined with hibernate.default_schema below, all table references
    # are unambiguously resolved to the synthetic schema.
    url: jdbc:postgresql://${DB_HOST:db}:5432/${DB_NAME:insurance_claims}?currentSchema=synthetic
    username: ${DB_USERNAME:claims_user}
    password: ${DB_PASSWORD:claims_pass}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_schema: synthetic

logging:
  level:
    root: WARN
    com.insurance.claim: INFO
    org.hibernate.SQL: WARN
